services:
  db:
    image: postgres:16-alpine3.23
    restart: unless-stopped
    environment:
      POSTGRES_DB: studyhub
      POSTGRES_USER: studyhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-set_a_local_postgres_password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyhub -d studyhub"]
      interval: 5s
      timeout: 5s
      retries: 20

  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    user: root
    environment:
      NODE_ENV: development
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-set_a_local_jwt_secret}
      DATABASE_URL: postgresql://studyhub:${POSTGRES_PASSWORD:-set_a_local_postgres_password}@db:5432/studyhub?schema=public
      DIRECT_URL: postgresql://studyhub:${POSTGRES_PASSWORD:-set_a_local_postgres_password}@db:5432/studyhub?schema=public
      SHADOW_DATABASE_URL: postgresql://studyhub:${POSTGRES_PASSWORD:-set_a_local_postgres_password}@db:5432/studyhub_shadow?schema=public
      UPLOADS_DIR: ${UPLOADS_DIR:-/app/uploads}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      CLAMAV_HOST: ${CLAMAV_HOST:-clamav}
      CLAMAV_PORT: ${CLAMAV_PORT:-3310}
      HTML_ARCHIVE_DAYS: ${HTML_ARCHIVE_DAYS:-20}
      HTML_ARCHIVE_INTERVAL_MS: ${HTML_ARCHIVE_INTERVAL_MS:-21600000}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      clamav:
        condition: service_started
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_uploads:/app/uploads
    command: node scripts/dev-entrypoint.js

  pgadmin:
    image: dpage/pgadmin4:8
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-set_a_local_pgadmin_password}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  frontend:
    build:
      context: ./frontend/studyhub-app
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5173
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: http://localhost:4000
      VITE_POSTHOG_KEY: ${VITE_POSTHOG_KEY:-}
      VITE_POSTHOG_HOST: ${VITE_POSTHOG_HOST:-https://us.i.posthog.com}
      VITE_CLARITY_PROJECT_ID: ${VITE_CLARITY_PROJECT_ID:-}
      VITE_SENTRY_DSN: ${VITE_FRONTEND_SENTRY_DSN:-}
      VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_FRONTEND_SENTRY_TRACES_SAMPLE_RATE:-0.1}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/studyhub-app:/app
      - frontend_node_modules:/app/node_modules
    command: node scripts/dev-entrypoint.js

volumes:
  postgres_data:
  pgadmin_data:
  backend_node_modules:
  frontend_node_modules:
  backend_uploads:
