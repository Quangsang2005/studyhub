name: Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci --prefix backend
      - run: npm ci --prefix frontend/studyhub-app
      - run: npm --prefix backend run lint
      - run: npm --prefix frontend/studyhub-app run lint
      - run: npm --prefix backend test
      - run: npm --prefix frontend/studyhub-app run build

  accessibility:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci --prefix frontend/studyhub-app
      - run: npm --prefix frontend/studyhub-app run build
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: frontend/studyhub-app/lighthouse.config.js
          uploadArtifacts: true

  bundle-size:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci --prefix frontend/studyhub-app
      - run: npm --prefix frontend/studyhub-app run build
      - name: Check bundle size
        run: |
          DIST_SIZE=$(du -sb frontend/studyhub-app/dist | cut -f1)
          MAX_SIZE=5242880  # 5MB budget
          if [ $DIST_SIZE -gt $MAX_SIZE ]; then
            echo "::warning::Bundle size ($DIST_SIZE bytes) exceeds budget ($MAX_SIZE bytes)"
          fi
          echo "Bundle size: $DIST_SIZE bytes"
